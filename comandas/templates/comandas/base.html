<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nice Restaurante{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── TEMA ESCURO (padrão) ───────────────────── */
    :root,
    [data-theme="dark"] {
      --bg:           #0C0A07;
      --bg-card:      #131008;
      --bg-raised:    #1A1610;
      --bg-hover:     #201B12;

      --gold:         #C8873A;
      --gold-lt:      #D4975A;
      --gold-dim:     rgba(200,135,58,0.10);
      --gold-border:  rgba(200,135,58,0.22);
      --gold-glow:    rgba(200,135,58,0.08);

      --cream:        #EDE0C4;
      --cream-60:     rgba(237,224,196,0.60);
      --cream-35:     rgba(237,224,196,0.35);
      --cream-15:     rgba(237,224,196,0.12);

      --green:        #7AAE7A;
      --green-bg:     rgba(122,174,122,0.12);
      --green-border: rgba(122,174,122,0.28);

      --red:          #C47070;
      --red-bg:       rgba(196,112,112,0.12);
      --red-border:   rgba(196,112,112,0.28);

      --shadow-card:  0 4px 24px rgba(0,0,0,0.3);
      --body-grad:    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(200,135,58,0.04) 0%, transparent 70%);

      --toggle-icon: "☀️";
    }

    /* ── TEMA CLARO ─────────────────────────────── */
    [data-theme="light"] {
      --bg:           #F7F3EC;
      --bg-card:      #FFFFFF;
      --bg-raised:    #F0EAE0;
      --bg-hover:     #EDE4D6;

      --gold:         #A86820;
      --gold-lt:      #C07828;
      --gold-dim:     rgba(168,104,32,0.08);
      --gold-border:  rgba(168,104,32,0.25);
      --gold-glow:    rgba(168,104,32,0.06);

      --cream:        #2C2418;
      --cream-60:     rgba(44,36,24,0.60);
      --cream-35:     rgba(44,36,24,0.40);
      --cream-15:     rgba(44,36,24,0.08);

      --green:        #3A7A3A;
      --green-bg:     rgba(58,122,58,0.10);
      --green-border: rgba(58,122,58,0.30);

      --red:          #A03030;
      --red-bg:       rgba(160,48,48,0.10);
      --red-border:   rgba(160,48,48,0.28);

      --shadow-card:  0 2px 12px rgba(44,36,24,0.08), 0 0 0 1px rgba(168,104,32,0.15);
      --body-grad:    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(168,104,32,0.04) 0%, transparent 70%);

      --toggle-icon: "🌙";
    }

    /* ── RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      background-image: var(--body-grad);
      background-attachment: fixed;
      transition: background .3s, color .3s;
    }

    /* ── SCROLLBAR ──────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

    /* ── HEADER ─────────────────────────────────── */
    header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gold-border);
      box-shadow: 0 1px 24px rgba(0,0,0,0.1);
      transition: background .3s, border-color .3s;
    }

    .logo { display: flex; align-items: center; gap: .7rem; text-decoration: none; flex-shrink: 0; }
    .logo-ring {
      width: 34px; height: 34px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow);
    }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--cream); letter-spacing: .3px; line-height: 1; }
    .logo-tagline { font-size: .6rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-top: 1px; }

    nav { display: flex; align-items: center; gap: .15rem; }
    nav a {
      color: var(--cream-35);
      text-decoration: none;
      font-size: .78rem; font-weight: 500;
      letter-spacing: .3px;
      padding: .4rem .85rem;
      border-radius: 6px;
      transition: color .2s, background .2s;
    }
    nav a:hover { color: var(--cream); background: var(--cream-15); }
    .btn-nav {
      background: var(--gold) !important;
      color: #fff !important;
      font-weight: 600 !important;
      margin-left: .5rem;
    }
    .btn-nav:hover { background: var(--gold-lt) !important; }

    /* Toggle tema */
    .theme-toggle {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid var(--gold-border);
      background: var(--gold-dim);
      color: var(--gold);
      cursor: pointer;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
      flex-shrink: 0;
      margin-left: .6rem;
    }
    .theme-toggle:hover { background: var(--gold-border); transform: rotate(20deg); }

    /* ── LAYOUT ─────────────────────────────────── */
    main { max-width: 1060px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── TYPOGRAPHY ─────────────────────────────── */
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2.1rem; font-weight: 300; color: var(--cream); letter-spacing: -.3px; line-height: 1.1; }
    .page-title b { font-weight: 600; color: var(--gold); }
    .section-label { font-size: .68rem; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: var(--cream-35); }

    /* ── CARDS ──────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 1.3rem;
      box-shadow: var(--shadow-card);
      transition: background .3s;
    }
    .card-raised {
      background: var(--bg-raised);
      border-radius: 10px;
      padding: 1.3rem;
      box-shadow: var(--shadow-card);
    }

    /* ── DIVIDER ─────────────────────────────────── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--gold-border) 20%, var(--gold-border) 80%, transparent); margin: .9rem 0; }

    /* ── BADGE ──────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: .3rem; padding: .2rem .65rem; border-radius: 20px; font-size: .7rem; font-weight: 500; letter-spacing: .3px; }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-open  { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }
    .badge-open::before  { background: var(--gold); box-shadow: 0 0 4px var(--gold); }
    .badge-closed { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .badge-closed::before { background: var(--green); }

    /* ── CHIP ───────────────────────────────────── */
    .chip { display: inline-block; font-size: .72rem; color: var(--cream-60); background: var(--cream-15); border: 1px solid rgba(44,36,24,0.08); border-radius: 6px; padding: .2rem .6rem; letter-spacing: .3px; }
    [data-theme="dark"] .chip { border-color: rgba(237,224,196,0.1); }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.2rem; border-radius: 7px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 500; letter-spacing: .2px; text-decoration: none; transition: all .18s; white-space: nowrap; line-height: 1; }
    .btn:hover { opacity: .88; }
    .btn-gold { background: var(--gold); color: #fff; box-shadow: 0 2px 12px var(--gold-glow); }
    .btn-gold:hover { background: var(--gold-lt); transform: translateY(-1px); }
    .btn-ghost { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }
    .btn-ghost:hover { background: rgba(200,135,58,0.16); transform: translateY(-1px); }
    .btn-success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .btn-success:hover { transform: translateY(-1px); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); font-size: .73rem; padding: .28rem .58rem; }

    /* ── FORMS ──────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .7rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--cream-35); margin-bottom: .45rem; }
    input, select, textarea {
      width: 100%; padding: .65rem .9rem;
      background: var(--bg);
      border: 1px solid var(--gold-border);
      border-radius: 7px;
      color: var(--cream);
      font-size: .9rem; font-family: 'Inter', sans-serif;
      transition: border-color .2s, box-shadow .2s, background .3s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    input::placeholder, textarea::placeholder { color: var(--cream-35); }
    textarea { resize: vertical; line-height: 1.5; }

    /* ── ERRO ───────────────────────────────────── */
    .erro { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); padding: .7rem 1rem; border-radius: 7px; font-size: .85rem; margin: .5rem 0; }

    /* ── HTMX ───────────────────────────────────── */
    .htmx-added { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .htmx-settling .flash-update { animation: goldPulse .5s ease; }
    @keyframes goldPulse { 0%, 100% { color: var(--gold); } 40% { color: var(--cream); text-shadow: 0 0 16px var(--gold-glow); } }
  </style>

  <script>
    // Aplica tema antes do render pra evitar flash
    (function() {
      const tema = localStorage.getItem('nice-tema') || 'dark';
      document.documentElement.setAttribute('data-theme', tema);
    })();
  </script>

  {% block extra_style %}{% endblock %}
</head>
<body>
  <header>
    <a href="{% url 'index' %}" class="logo">
      <div class="logo-ring">N</div>
      <div>
        <div class="logo-name">Nice</div>
        <div class="logo-tagline">Restaurante</div>
      </div>
    </a>
    <nav>
      <a href="{% url 'index' %}">Comandas</a>
      <a href="{% url 'historico' %}">Histórico</a>
      <a href="/admin/" target="_blank">Admin</a>
      <a href="{% url 'nova_comanda' %}" class="btn btn-nav">+ Nova comanda</a>
      <button class="theme-toggle" onclick="toggleTema()" title="Alternar tema" id="tema-btn">☀️</button>
    </nav>
  </header>

  <main>{% block content %}{% endblock %}</main>

  <script>
    function toggleTema() {
      const html = document.documentElement;
      const atual = html.getAttribute('data-theme');
      const novo = atual === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', novo);
      localStorage.setItem('nice-tema', novo);
      document.getElementById('tema-btn').textContent = novo === 'dark' ? '🔅' : '🌙';
    }

    // Sincroniza ícone ao carregar
    (function() {
      const tema = localStorage.getItem('nice-tema') || 'dark';
      document.getElementById('tema-btn').textContent = tema === 'dark' ? '🔅' : '🌙';
    })();
  </script>
</body>
</html>
