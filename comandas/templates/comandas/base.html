<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nice Restaurante{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:           #0C0A07;
      --bg-card:      #131008;
      --bg-raised:    #1A1610;
      --bg-hover:     #201B12;

      --gold:         #C8873A;
      --gold-lt:      #D4975A;
      --gold-dim:     rgba(200,135,58,0.10);
      --gold-border:  rgba(200,135,58,0.22);
      --gold-glow:    rgba(200,135,58,0.08);

      --cream:        #EDE0C4;
      --cream-60:     rgba(237,224,196,0.60);
      --cream-35:     rgba(237,224,196,0.35);
      --cream-15:     rgba(237,224,196,0.12);

      --green:        #7AAE7A;
      --green-bg:     rgba(122,174,122,0.12);
      --green-border: rgba(122,174,122,0.28);

      --red:          #C47070;
      --red-bg:       rgba(196,112,112,0.12);
      --red-border:   rgba(196,112,112,0.28);

      --r:            10px;
      --r-sm:         7px;
    }

    /* ── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      /* Subtle warm radial glow from center */
      background-image: radial-gradient(ellipse 120% 60% at 50% 0%, rgba(200,135,58,0.04) 0%, transparent 70%);
      background-attachment: fixed;
    }

    /* ── SCROLLBAR ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12,10,7,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gold-border);
      /* Subtle gold line at very top */
      box-shadow: 0 -1px 0 0 var(--gold-dim) inset, 0 1px 24px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .7rem;
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo-ring {
      width: 34px; height: 34px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: -.5px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(200,135,58,0.15);
    }
    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: .3px;
      line-height: 1;
    }
    .logo-tagline {
      font-size: .6rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 1px;
    }

    nav { display: flex; align-items: center; gap: .15rem; }
    nav a {
      color: var(--cream-35);
      text-decoration: none;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .3px;
      padding: .4rem .85rem;
      border-radius: var(--r-sm);
      transition: color .2s, background .2s;
    }
    nav a:hover { color: var(--cream); background: var(--cream-15); }

    .btn-nav {
      background: var(--gold) !important;
      color: var(--bg) !important;
      font-weight: 600 !important;
      margin-left: .5rem;
      letter-spacing: .2px;
    }
    .btn-nav:hover { background: var(--gold-lt) !important; color: var(--bg) !important; }

    /* ── LAYOUT ─────────────────────────────────────── */
    main {
      max-width: 1060px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── TYPOGRAPHY ─────────────────────────────────── */
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: -.3px;
      line-height: 1.1;
    }
    .page-title strong, .page-title b {
      font-weight: 600;
      color: var(--gold);
    }

    .section-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--cream-35);
    }

    /* ── CARDS ──────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border-radius: var(--r);
      padding: 1.3rem;
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.03) inset,
        0 0 0 1px var(--gold-border),
        0 4px 24px rgba(0,0,0,0.3);
    }

    .card-raised {
      background: var(--bg-raised);
      border-radius: var(--r);
      padding: 1.3rem;
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.04) inset,
        0 0 0 1px rgba(200,135,58,0.18),
        0 8px 32px rgba(0,0,0,0.35);
    }

    /* ── DIVIDER ─────────────────────────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-border) 20%, var(--gold-border) 80%, transparent);
      margin: .9rem 0;
    }

    /* ── BADGE ──────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .3px;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge-open  { background: rgba(200,135,58,0.12); color: var(--gold);  border: 1px solid rgba(200,135,58,0.3); }
    .badge-open::before  { background: var(--gold); box-shadow: 0 0 4px var(--gold); }
    .badge-closed { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .badge-closed::before { background: var(--green); }

    /* ── CHIP ───────────────────────────────────────── */
    .chip {
      display: inline-block;
      font-size: .72rem;
      color: var(--cream-60);
      background: var(--cream-15);
      border: 1px solid rgba(237,224,196,0.1);
      border-radius: 6px;
      padding: .2rem .6rem;
      letter-spacing: .3px;
    }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .55rem 1.2rem;
      border-radius: var(--r-sm);
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: .2px;
      text-decoration: none;
      transition: all .18s;
      white-space: nowrap;
      line-height: 1;
    }
    .btn-gold {
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 2px 12px rgba(200,135,58,0.25);
    }
    .btn-gold:hover { background: var(--gold-lt); box-shadow: 0 4px 20px rgba(200,135,58,0.35); transform: translateY(-1px); }
    .btn-ghost {
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid var(--gold-border);
    }
    .btn-ghost:hover { background: rgba(200,135,58,0.16); transform: translateY(-1px); }
    .btn-success {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-border);
    }
    .btn-success:hover { background: rgba(122,174,122,0.2); transform: translateY(-1px); }
    .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-border);
      font-size: .73rem;
      padding: .28rem .58rem;
    }
    .btn-danger:hover { background: rgba(196,112,112,0.22); }

    /* ── FORMS ──────────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--cream-35);
      margin-bottom: .45rem;
    }
    input, select, textarea {
      width: 100%;
      padding: .65rem .9rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(237,224,196,0.12);
      border-radius: var(--r-sm);
      color: var(--cream);
      font-size: .9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold-border);
      box-shadow: 0 0 0 3px rgba(200,135,58,0.08);
    }
    input::placeholder, textarea::placeholder { color: var(--cream-35); }
    textarea { resize: vertical; line-height: 1.5; }

    /* ── ERRO ───────────────────────────────────────── */
    .erro {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-border);
      padding: .7rem 1rem;
      border-radius: var(--r-sm);
      font-size: .85rem;
      margin: .5rem 0;
    }

    /* ── HTMX TRANSITIONS ───────────────────────────── */
    .htmx-added {
      animation: slideIn .25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: none; }
    }
    .htmx-settling .flash-update {
      animation: goldPulse .5s ease;
    }
    @keyframes goldPulse {
      0%, 100% { color: var(--gold); }
      40%       { color: #fff; text-shadow: 0 0 16px rgba(200,135,58,0.6); }
    }
    .htmx-indicator { opacity: 0; transition: opacity .2s ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <header>
    <a href="{% url 'index' %}" class="logo">
      <div class="logo-ring">N</div>
      <div>
        <div class="logo-name">Nice</div>
        <div class="logo-tagline">Restaurante</div>
      </div>
    </a>
    <nav>
      <a href="{% url 'index' %}">Comandas</a>
      <a href="{% url 'historico' %}">Histórico</a>
      <a href="/admin/" target="_blank">Admin</a>
      <a href="{% url 'nova_comanda' %}" class="btn btn-nav">+ Nova comanda</a>
    </nav>
  </header>

  <main>{% block content %}{% endblock %}</main>
</body>
</html>
