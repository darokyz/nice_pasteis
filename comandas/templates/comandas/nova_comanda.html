{% extends "comandas/base.html" %}
{% block title %}Nova Comanda — Nice{% endblock %}
{% block content %}
<div style="max-width:440px;margin:0 auto;padding-top:1rem;">
  <a href="{% url 'index' %}" style="color:var(--muted);font-size:.8rem;text-decoration:none;letter-spacing:.5px;">← COMANDAS</a>
  <h1 class="page-title" style="margin-top:.8rem;">Nova <span>Comanda</span></h1>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label for="mesa">Mesa</label>
          <input type="number" id="mesa" name="mesa" placeholder="Ex: 18" min="1" autofocus>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label for="cliente">Cliente <span style="text-transform:none;font-size:.7rem;color:var(--muted);">(opcional)</span></label>
          <input type="text" id="cliente" name="cliente" placeholder="Ex: João">
        </div>
      </div>

      <div class="form-group" style="margin-top:.9rem;">
        <label for="obs">Observações <span style="text-transform:none;font-size:.7rem;color:var(--muted);">(opcional)</span></label>
        <textarea id="obs" name="obs" rows="2" placeholder="Ex: cliente alérgico a amendoim, sem cebola..."></textarea>
      </div>

      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;padding:.75rem;font-size:.9rem;margin-top:.3rem;">
        Abrir comanda
      </button>
    </form>
  </div>
</div>
{% endblock %}
